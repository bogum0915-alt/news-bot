name: news-bot

on:
  schedule:
    - cron: "*/5 * * * *"   # 5분마다 (GitHub 최소 단위, 실제론 5~20분 간격)
  workflow_dispatch:         # 수동 실행 버튼

permissions:
  contents: write            # state/seen.json 커밋용

concurrency:
  group: news-bot            # 이전 실행이 밀렸을 때 겹침 방지
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LOOKBACK_MIN: "120"   # cron 지연 대비 여유 창 (중복은 seen.json 이 막음)
          IMPORTANCE_MIN: "3"   # Gemini 중요도 컷 (1~5) — 높일수록 조용해짐
        run: python -m src.main

      - name: persist seen state
        run: |
          git config user.name "news-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state/seen.json
          if ! git diff --cached --quiet; then
            git commit -m "state: update seen articles"
            git pull --rebase
            git push
          fi
